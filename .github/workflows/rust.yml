name: Tauri Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ORT_USE_CUDA: 0

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ./src-tauri/target
          key: ${{ runner.os }}-rust-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-target-

      - name: Cache ONNX Runtime binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ort-sys
            ~/AppData/Local/ort-sys
          key: ${{ runner.os }}-ort-sys-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ort-sys-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Verify Tauri CLI installation
        run: cargo tauri --version

      - name: Pre-download ONNX Runtime
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            Write-Host "Attempting to download ONNX Runtime binaries (attempt $env:GITHUB_ATTEMPT)..."
            cargo build --manifest-path src-tauri/Cargo.toml --lib
          shell: pwsh
        env:
          ORT_DOWNLOAD_TIMEOUT: "600"

      - name: Build Tauri application
        run: cargo tauri build
        working-directory: .
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          ORT_DOWNLOAD_TIMEOUT: "600"

      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          dir src-tauri\target\release\bundle\msi\*.msi 2>nul || echo "No MSI files found"
          dir src-tauri\target\release\bundle\nsis\*.exe 2>nul || echo "No NSIS files found"

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: viewstage-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: viewstage-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

