name: Tauri Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            config-path: src-tauri/tauri.conf.json

          - label: windows-compat
            os: windows-latest
            target: x86_64-pc-windows-msvc
            config-path: src-tauri/tauri.conf.compat.json

          - label: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            config-path: src-tauri/tauri.conf.json

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.label }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.label }}-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --locked -y

      - name: Verify Tauri CLI version
        run: cargo tauri --version

      - name: Clean previous bundle artifacts
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri application
        run: cargo tauri build --config ${{ matrix.config-path }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Rename artifacts with platform suffix
        shell: bash
        run: |
          suffix=""
          case "${{ matrix.label }}" in
            windows-compat) suffix="-win7-compat" ;;
            linux)          suffix="-linux" ;;
          esac
          if [ -n "$suffix" ]; then
            find src-tauri/target/release/bundle -maxdepth 2 -type f \
              \( -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name '*.msi' -o -name '*.exe' \) \
              -exec sh -c '
                s="$1"; shift
                for f; do
                  case "$f" in
                    *.tar.gz)
                      d="${f%.tar.gz}"
                      mv "$f" "${d}${s}.tar.gz"
                      ;;
                    *)
                      d="${f%.*}"
                      e="${f##*.}"
                      mv "$f" "${d}${s}.${e}"
                      ;;
                  esac
                done
              ' sh "$suffix" {} +
          fi

      - name: List build artifacts
        shell: bash
        run: |
          echo "=== Build artifacts (${{ matrix.label }}) ==="
          find src-tauri/target/release/bundle -maxdepth 2 -type f -exec ls -lh {} \;

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: viewstage-${{ matrix.label }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn
          retention-days: 30


