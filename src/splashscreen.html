<!DOCTYPE html>
<!--
  ViewStage 启动闪屏
  展示 Logo、应用名称、加载进度条，支持主题样式适配
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewStage</title>
    <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        body.theme-simplify {
            background: #f5f5f5;
        }

        body.theme-dark {
            background: #1a1a1a;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-wrapper {
            width: 64px;
            height: 64px;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.1s forwards;
            transition: color 0.3s ease;
        }

        body.theme-simplify .app-name {
            color: #333333;
        }

        body.theme-dark .app-name {
            color: #ffffff;
        }

        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.2s forwards;
        }

        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        body.theme-simplify .loading-bar-container {
            background: rgba(0, 0, 0, 0.1);
        }

        body.theme-dark .loading-bar-container {
            background: rgba(255, 255, 255, 0.1);
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        body.theme-simplify .loading-bar {
            background: rgba(52, 152, 219, 0.8);
        }

        body.theme-dark .loading-bar {
            background: rgba(255, 255, 255, 0.6);
        }

        .loading-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            min-height: 16px;
            transition: color 0.3s ease;
        }

        body.theme-simplify .loading-text {
            color: rgba(0, 0, 0, 0.4);
        }

        body.theme-dark .loading-text {
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="assets/Square1024x1024Logo.png" alt="ViewStage">
        </div>
        <div class="app-name">ViewStage</div>
        <div class="loading-section">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text" id="loadingText"></div>
        </div>
    </div>

    <script>
        console.log('[splash] script start, __TAURI__:', !!window.__TAURI__);
        const loadingBar = document.getElementById('loadingBar');
        const loadingText = document.getElementById('loadingText');
        console.log('[splash] DOM refs:', { bar: !!loadingBar, text: !!loadingText });
        
        const listen = window.__TAURI__?.event?.listen;
        const invoke = window.__TAURI__?.core?.invoke;
        console.log('[splash] Tauri APIs:', { hasListen: !!listen, hasInvoke: !!invoke });
        
        const loadingSteps = [
            { key: 'init', text: '正在初始化...', progress: 10 },
            { key: 'settings', text: '正在加载设置...', progress: 30 },
            { key: 'theme', text: '正在加载主题...', progress: 50 },
            { key: 'camera', text: '正在初始化摄像头...', progress: 70 },
            { key: 'finalize', text: '正在完成...', progress: 90 },
            { key: 'done', text: '', progress: 100 }
        ];
        
        let currentStep = 0;
        
        function splash_apply_theme(themeName) {
            console.log('[splash] applyTheme:', themeName);
            document.body.classList.remove('theme-simplify', 'theme-dark');
            if (themeName === 'com.viewstage.theme.simplify') {
                document.body.classList.add('theme-simplify');
            } else {
                document.body.classList.add('theme-dark');
            }
        }
        
        async function splash_load_theme() {
            console.log('[splash] loadTheme start, hasInvoke:', !!invoke);
            if (invoke) {
                try {
                    const result = await invoke('settings_fetch_all');
                    console.log('[splash] settings loaded:', result.settings?.theme);
                    const themeName = result.settings?.theme || 'com.viewstage.theme.simplify';
                    splash_apply_theme(themeName);
                } catch (e) {
                    console.log('[splash] 加载主题设置失败:', e?.message || e);
                    splash_apply_theme('com.viewstage.theme.dark');
                }
            } else {
                console.log('[splash] no invoke, using dark');
                splash_apply_theme('com.viewstage.theme.dark');
            }
            console.log('[splash] loadTheme done');
        }
        
        function splash_update_progress(step) {
            console.log('[splash] progress:', step);
            const stepData = loadingSteps[step];
            if (stepData) {
                loadingBar.style.width = stepData.progress + '%';
                loadingText.textContent = stepData.text;
            }
        }
        
        console.log('[splash] initial progress 0');
        splash_update_progress(0);
        splash_load_theme().then(() => console.log('[splash] splash_load_theme promise resolved'));
        
        if (listen) {
            console.log('[splash] registering listen splash-progress');
            listen('splash-progress', (event) => {
                const { step, message } = event.payload || {};
                console.log('[splash] event received:', { step, message });
                
                if (step === -1) {
                    // 诊断信息
                    console.log('[splash] DIAG:', message);
                    loadingText.textContent = '诊断: ' + message;
                    return;
                }
                
                if (step !== undefined) {
                    splash_update_progress(step);
                }
                
                if (message) {
                    loadingText.textContent = message;
                }
            }).then(() => {
                console.log('[splash] listen registered successfully');
            }).catch((err) => {
                console.log('[splash] listen failed:', err?.message || err);
            });
        } else {
            console.log('[splash] listen API not available');
        }
        
        console.log('[splash] setting fallback timeout 300ms');
        setTimeout(() => {
            console.log('[splash] fallback timeout fired, currentStep:', currentStep);
            if (currentStep === 0) {
                splash_update_progress(1);
            }
        }, 300);
        
        // 诊断：如果 5 秒后没有收到任何 progress 事件，检查主窗口状态
        setTimeout(async () => {
            console.log('[splash] diagnostic check start');
            if (invoke) {
                try {
                    const loaded = await invoke('main_check_loaded');
                    console.log('[splash] main_check_loaded =', loaded);
                    if (!loaded) {
                        loadingText.textContent = '诊断：主窗口脚本未加载，检查控制台错误';
                        loadingText.style.color = '#ff6b6b';
                    }
                } catch (e) {
                    console.log('[splash] diagnostic error:', e);
                }
            }
        }, 5000);
    </script>
</body>
</html>
