<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViewStage</title>
    <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-wrapper {
            width: 64px;
            height: 64px;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.1s forwards;
        }

        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.2s forwards;
        }

        .loading-bar-container {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .loading-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
            min-height: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="assets/Square1024x1024Logo.png" alt="ViewStage">
        </div>
        <div class="app-name">ViewStage</div>
        <div class="loading-section">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text" id="loadingText"></div>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('loadingBar');
        const loadingText = document.getElementById('loadingText');
        
        const { listen } = window.__TAURI__?.event || {};
        const { invoke } = window.__TAURI__?.core || {};
        
        const loadingSteps = [
            { key: 'init', text: '正在初始化...', progress: 10 },
            { key: 'settings', text: '正在加载设置...', progress: 30 },
            { key: 'theme', text: '正在加载主题...', progress: 50 },
            { key: 'camera', text: '正在初始化摄像头...', progress: 70 },
            { key: 'finalize', text: '正在完成...', progress: 90 },
            { key: 'done', text: '', progress: 100 }
        ];
        
        let currentStep = 0;
        
        function updateProgress(step) {
            const stepData = loadingSteps[step];
            if (stepData) {
                loadingBar.style.width = stepData.progress + '%';
                loadingText.textContent = stepData.text;
            }
        }
        
        updateProgress(0);
        
        if (listen) {
            listen('splash-progress', (event) => {
                const { step, message } = event.payload || {};
                
                if (step !== undefined) {
                    updateProgress(step);
                }
                
                if (message) {
                    loadingText.textContent = message;
                }
            });
        }
        
        setTimeout(() => {
            if (currentStep === 0) {
                updateProgress(1);
            }
        }, 300);
    </script>
</body>
</html>
