<!DOCTYPE html>
<!--
  ViewStage 主应用窗口
  包含：画布层（图片/视频/批注画布）、工具栏、画笔面板、旋转面板
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ViewStage</title>
    <link rel="stylesheet" href="styles.css">
    <script src="JS/pdf.min.js" defer></script>
    <script src="i18n.js" defer></script>
    <script>
        window.__TAURI__?.core.invoke('main_signal_loaded').catch(()=>{});
        (async()=>{
            try {
                await import('./themes/theme.js');
                await import('./pen_tessellator.js');
                await import('./main.js');
                await import('./blackboard.js');
                await import('./modules/pdf/document_reader_page.js');
                await import('./modules/pdf/document_reader.js');
                await import('./init.js');
            } catch(e) {
                console.error('[boot] module load error:', e);
                try {
                    const msg = '模块加载失败: ' + (e.message || e);
                    document.getElementById('canvasContainer') &&
                    (document.getElementById('canvasContainer').innerHTML =
                        '<div style="padding:40px;color:red;font-size:18px">' + msg + '</div>');
                } catch(_) {}
            }
        })();
    </script>
    <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
</head>
<body>
    <div class="container">
        <div class="main-function">
            <div class="canvas-container" id="canvasContainer">
                <div class="canvas-wrapper" id="canvasWrapper">
                    <img id="imageElement" class="image-element" alt="">
                    <video id="cameraVideo" class="camera-video" autoplay playsinline muted></video>
                </div>
                <div class="eraser-hint" id="eraserHint"></div>
            </div>
            
            <div class="pen-control-panel" id="penControlPanel">
                <div class="pen-size-presets" id="penSizePresets">
                    <span class="pen-size-label" id="penSizeValue">5px</span>
                </div>
                <div class="pen-color-buttons" id="penColorButtons">
                    <button class="pen-color-btn" data-index="0" title="颜色1"></button>
                    <button class="pen-color-btn" data-index="1" title="颜色2"></button>
                    <button class="pen-color-btn" data-index="2" title="颜色3"></button>
                    <button class="pen-color-btn" data-index="3" title="颜色4"></button>
                    <button class="pen-color-btn" data-index="4" title="颜色5"></button>
                    <button class="pen-color-btn" data-index="5" title="颜色6"></button>
                    <button class="pen-color-btn" data-index="6" title="颜色7"></button>
                    <button class="pen-color-btn" data-index="7" title="颜色8"></button>
                    <button class="pen-color-btn" data-index="8" title="颜色9"></button>
                    <button class="pen-color-btn" data-index="9" title="颜色10"></button>
                    <button class="pen-color-btn" data-index="10" title="颜色11"></button>
                    <button class="pen-color-btn" data-index="11" title="颜色12"></button>
                    <button class="pen-color-btn" data-index="12" title="颜色13"></button>
                    <button class="pen-color-btn" data-index="13" title="颜色14"></button>
                    <button class="pen-color-btn" data-index="14" title="颜色15"></button>
                </div>
                <div class="pen-size-presets" id="eraserSizePresets">
                    <button class="size-preset-btn" data-value="5" style="--dot-size:8px"></button>
                    <button class="size-preset-btn" data-value="15" style="--dot-size:12px"></button>
                    <button class="size-preset-btn" data-value="25" style="--dot-size:16px"></button>
                    <button class="size-preset-btn" data-value="38" style="--dot-size:20px"></button>
                    <button class="size-preset-btn" data-value="50" style="--dot-size:24px"></button>
                    <span class="pen-size-label" id="eraserSizeValue">15px</span>
                </div>
            </div>
            
            <div class="settings-panel" id="settingsPanel">
                <div class="settings-row">
                    <span class="settings-label" data-i18n="rotation.rotateLeft">旋转</span>
                    <div class="settings-btn-group">
                        <button class="settings-btn" id="btnRotateLeft" data-i18n-title="rotation.rotateLeft">
                            ↺
                        </button>
                        <button class="settings-btn" id="btnRotateRight" data-i18n-title="rotation.rotateRight">
                            ↻
                        </button>
                    </div>
                </div>
                <div class="settings-row settings-slider-row">
                    <span class="settings-label">亮度</span>
                    <div class="slider-wrapper">
                        <input id="cameraBrightness" type="range" min="-100" max="100" value="10">
                        <span class="settings-slider-val" id="cameraBrightnessValue">10</span>
                    </div>
                </div>
                <div class="settings-row settings-slider-row">
                    <span class="settings-label">对比度</span>
                    <div class="slider-wrapper">
                        <input id="cameraContrast" type="range" min="0" max="300" value="140">
                        <span class="settings-slider-val" id="cameraContrastValue">1.40</span>
                    </div>
                </div>
                <div class="settings-row settings-slider-row">
                    <span class="settings-label">黑白</span>
                    <div class="option-group" id="cameraGrayscaleGroup" data-active="off">
                        <button class="option-btn active" data-value="off">关闭</button>
                        <button class="option-btn" data-value="on">开启</button>
                    </div>
                </div>
                <div class="settings-row settings-reset-row">
                    <button class="settings-btn settings-reset-btn" id="btnResetSliders">重置图片设置</button>
                </div>
            </div>
            
            <div class="blackboard-panel" id="blackboardPanel">
                <div class="blackboard-canvas-wrap" id="blackboardCanvasWrap">
                    <canvas id="blackboardCanvas"></canvas>
                </div>
            </div>

            <div class="document-reader-panel" id="documentReaderPanel">
                <div class="doc-reader-scroll-container" id="docReaderScrollContainer"></div>
            </div>
            
            <div class="toolbar">
                <div class="toolbar-left">
                    <button class="toolbar-btn" id="btnMenu">
                        <img data-icon="menu" width="16" height="16" alt="菜单">
                        <span data-i18n="toolbar.menu">菜单</span>
                    </button>
                    <button class="toolbar-btn" id="btnMinimize">
                        <img data-icon="minimize" width="16" height="16" alt="最小化">
                        <span data-i18n="toolbar.minimize">最小化</span>
                    </button>
                </div>
                
                <div class="toolbar-center">
                    <button class="toolbar-btn function-btn" id="btnMove" data-mode="move">
                        <img data-icon="move" width="16" height="16" alt="移动">
                        <span data-i18n="toolbar.move">移动</span>
                    </button>
                    <button class="toolbar-btn function-btn" id="btnComment" data-mode="comment">
                        <img data-icon="pen" width="16" height="16" alt="批注">
                        <span data-i18n="toolbar.comment">批注</span>
                    </button>
                    <button class="toolbar-btn function-btn" id="btnEraser" data-mode="eraser">
                        <img data-icon="eraser" width="16" height="16" alt="橡皮">
                        <span data-i18n="toolbar.eraser">橡皮</span>
                    </button>
                    <button class="toolbar-btn function-btn" id="btnUndo">
                        <img data-icon="undo" width="16" height="16" alt="撤销">
                        <span data-i18n="toolbar.undo">撤销</span>
                    </button>
                    <button class="toolbar-btn function-btn" id="btnClear">
                        <img data-icon="clear" width="16" height="16" alt="清空">
                        <span data-i18n="toolbar.clearAnnotations">清空</span>
                    </button>
                    
                    <button class="toolbar-btn function-btn" id="btnBlackboard">
                        <img data-icon="blackboard" width="16" height="16" alt="小黑板">
                        <span>黑板</span>
                    </button>
                    
                    <div class="toolbar-separator"></div>
                    
                    <button class="toolbar-btn function-btn" id="btnPhoto">
                        <img data-icon="camera" width="16" height="16" alt="拍照">
                        <span data-i18n="toolbar.photo">拍照</span>
                    </button>
                    
                    <button class="toolbar-btn function-btn" id="btnSettings">
                        <img data-icon="settings" width="16" height="16" alt="设置">
                        <span data-i18n="toolbar.settings">设置</span>
                    </button>
                    
                    <div class="toolbar-bb-group" id="bbToolGroup" style="display:none">
                        <button class="toolbar-btn function-btn" id="bbPagePrev" disabled>
                            <img data-icon="chevron-left" width="16" height="16" alt="上一页">
                        </button>
                        <span class="bb-page-indicator" id="bbPageIndicator">1 / 1</span>
                        <button class="toolbar-btn function-btn" id="bbPageNext">
                            <img data-icon="chevron-right" width="16" height="16" alt="下一页">
                        </button>
                        <button class="toolbar-btn function-btn" id="bbPageAdd">
                            <img data-icon="add" width="16" height="16" alt="添加页面">
                        </button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn function-btn" id="bbClose">
                            <img data-icon="dismiss" width="16" height="16" alt="关闭">
                            <span>关闭</span>
                        </button>
                    </div>
                </div>
                
                <div class="toolbar-right">
                    <div class="toolbar-dr-group" id="drToolGroup" style="display:none">
                        <button class="toolbar-btn function-btn" id="drBtnClose">
                            <img data-icon="dismiss" width="16" height="16" alt="关闭">
                            <span>关闭</span>
                        </button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn function-btn" id="drBtnMove" data-mode="move">
                            <img data-icon="move" width="16" height="16" alt="移动">
                        </button>
                        <button class="toolbar-btn function-btn active" id="drBtnComment" data-mode="comment">
                            <img data-icon="pen" width="16" height="16" alt="批注">
                        </button>
                        <button class="toolbar-btn function-btn" id="drBtnEraser" data-mode="eraser">
                            <img data-icon="eraser" width="16" height="16" alt="橡皮">
                        </button>
                        <button class="toolbar-btn function-btn" id="drBtnUndo">
                            <img data-icon="undo" width="16" height="16" alt="撤销">
                        </button>
                        <button class="toolbar-btn function-btn" id="drBtnClear">
                            <img data-icon="clear" width="16" height="16" alt="清空">
                        </button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn function-btn" id="drPagePrev" disabled>
                            <img data-icon="chevron-left" width="16" height="16" alt="上一页">
                        </button>
                        <span class="dr-page-indicator" id="drPageIndicator">1 / 1</span>
                        <button class="toolbar-btn function-btn" id="drPageNext">
                            <img data-icon="chevron-right" width="16" height="16" alt="下一页">
                        </button>
                    </div>

                    <button class="toolbar-btn" id="btnExpand">
                        <img data-icon="image" width="16" height="16" alt="图片">
                        <span data-i18n="toolbar.image">图片</span>
                    </button>
                    <button class="toolbar-btn" id="btnSave">
                        <img data-icon="file" width="16" height="16" alt="文件">
                        <span data-i18n="toolbar.file">文件</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
